<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Bloqueado - temporariamente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --text: #efefef;
            --text-dim: #999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Evita rolagem se possível */
        }

        /* Botão Voltar Compacto */
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 6px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        .btn-back:hover {
            color: #fff;
            background: var(--purple);
            border-color: var(--purple);
            box-shadow: 0 0 15px var(--purple-glow);
        }

        /* Container Reduzido */
        .card {
            width: 90%;
            max-width: 480px;
            background: var(--card);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            animation: slideUp 0.5s ease-out;
        }

        .icon-box {
            background: rgba(168, 85, 247, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            border: 1px solid var(--purple-glow);
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .accent { color: var(--purple); }

        .content {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.3), transparent);
            margin: 18px 0;
        }

        .info-footer {
            font-size: 0.85rem;
            opacity: 0.7;
            font-style: italic;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-height: 500px) {
            body { align-items: flex-start; padding-top: 60px; overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="index.html" class="btn-back">← Voltar</a>
    </div>

    <div class="card">
        <div class="icon-box">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>

        <h1>Acesso <span class="accent">Indisponível</span></h1>
        
        <div class="content">
            <p>O sistema de login e cadastro foi desativado por motivos de <span class="accent">moderação</span>.</p>
            <p style="margin-top: 8px;">Identificamos condutas inadequadas e ofensas no chat que violam nossas diretrizes de convivência.</p>
        </div>

        <div class="divider"></div>

        <div class="info-footer">
            Priorizamos um ambiente <span class="accent">seguro</span>. <br>
            Normalizaremos o acesso em breve.
        </div>
    </div>

</body>
    </html>
